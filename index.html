<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Countdown to returning home with live timezone clocks and journey progress tracking." />
  <title>Countdown to Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="badge">✈️ Countdown home</div>
      <div class="clocks">
        <div class="clock">
          <div class="label">Munich</div>
          <div id="munichClock" class="time">--:--:--</div>
        </div>
        <div class="clock">
          <div class="label">Vancouver</div>
          <div id="vancouverClock" class="time">--:--:--</div>
        </div>
      </div>
    </div>

    <div class="main">
      <div id="countdown" class="countdown">000:00:00:00:<small>000</small></div>
      <div id="meta" class="meta">Live countdown in Munich local time</div>
      <div id="done" class="done">Back home ✨</div>

      <div class="progress-card">
        <div class="route">
          <div class="city" style="text-align:left;"><strong>Home</strong><span>Munich (:</span></div>
          <div></div>
          <div class="city" style="text-align:right;"><strong>Home</strong><span>Munich :)</span></div>
        </div>

        <div class="track-wrap">
          <div class="track">
            <div id="trackFill" class="track-fill"></div>
          </div>
          <div id="plane" class="plane">✈️</div>
        </div>

        <div class="stats">
          <span>Progress: <strong id="progressPct">0%</strong></span>
          <span>Elapsed: <strong id="elapsed">0h</strong></span>
          <span>Remaining: <strong id="remaining">0h</strong></span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
